name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev

      - name: Build and test (macOS)
        if: runner.os == 'macOS'
        run: ./scripts/build_tests_macos.sh

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        run: ./scripts/build_tests_linux.sh

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build_tests_windows.ps1
