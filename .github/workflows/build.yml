name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev

      - name: Build and test (macOS)
        if: runner.os == 'macOS'
        run: ./scripts/build_tests_macos.sh

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        run: ./scripts/build_tests_linux.sh

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build_tests_windows.ps1

  static-analysis:
    name: Static analysis (clang-tidy)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy ripgrep libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev

      - name: Configure compile database
        run: cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DBM_ENABLE_TESTS=OFF

      - name: Run clang-tidy summary
        run: bash ./scripts/run_clang_tidy.sh --summary-only --output clang-tidy-report.txt
